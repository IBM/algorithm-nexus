model:
  id: "example-org/example-model"
  owner: "example-team"

  vllm:
    enabled: true
    plugins:
      io_processors:
        - "example-processor"

  testing:
    hardware:
      gpu:
        type: "NVIDIA A100"
        count: 1
        cpu_fallback: false
      cpu:
        cores: 8
        ram: "32GB"

    commands:
      - "pytest tests/test_inference.py -v"

    vllm:
      commands:
        - "pytest tests/test_vllm.py -v"

  benchmarking:
    experiments:
      - name: "standard-benchmark"
        args: "--batch-size 8"

    custom_experiments:
      - name: "custom-benchmark"
        python_module: "benchmarks/custom.py"
        args: "--mode advanced"
