# Binding references 'nonexistent_metric' which is not in the definition's metrics list

logicalBenchmark:
  benchmarkIdentifier: inference_serving
  description: "Test benchmark"
  target:
    identifier: model
  properties:
    - identifier: dataset
  metrics:
    - throughput_tokens_per_second

bindings:
  - benchmarkIdentifier: inference_serving
    experiment:
      actuatorIdentifier: vllm_performance
      experimentIdentifier: guide_llm_runner
      experimentVersion: 1.0.0
    targetMapping: model_name
    metricMapping:
      - benchmark:
          identifier: nonexistent_metric
        experiment:
          identifier: some_internal_metric
