# Binding references 'nonexistent_property' which is not in the definition

logicalBenchmark:
  benchmarkIdentifier: inference_serving
  description: "Test benchmark"
  target:
    identifier: model
  properties:
    - identifier: dataset

bindings:
  - benchmarkIdentifier: inference_serving
    experiment:
      actuatorIdentifier: vllm_performance
      experimentIdentifier: guide_llm_runner
      experimentVersion: 1.0.0
    targetMapping: model_name
    propertyMapping:
      - benchmark:
          identifier: nonexistent_property
        experiment:
          identifier: input_data_path
